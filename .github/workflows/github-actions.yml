name: Android Beta CI

on:
  push:
    branches:
      - github_actions

jobs:
  distribute:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Prepare Local Properties
        run: |
            echo "tmdb_token=${{ secrets.TMDB_TOKEN }}" > local.properties
            echo "firebase_beta_id=${{ secrets.FIREBASE_BETA_ID }}" >> local.properties

      # - name: Decode Keystore
      #   run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > keystore.jks

      - name: Run Fastlane Beta
        run: bundle exec fastlane beta